name: EVA-Mind CI/CD

on:
  push:
    branches: [main]

env:
  GO_VERSION: "1.24"
  VM_IP: "34.35.36.178"
  VM_USER: "web2a"

jobs:
  # ============================================================================
  # BUILD & TEST (local no GitHub Actions)
  # ============================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout NietzscheDB SDK
        uses: actions/checkout@v4
        with:
          repository: JoseRFJuniorLLMs/NietzscheDB
          path: nietzsche-sdk-src

      - name: Symlink NietzscheDB for go.mod replace
        run: ln -s "$GITHUB_WORKSPACE/nietzsche-sdk-src" "$GITHUB_WORKSPACE/../Nietzsche-Database"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build
        run: |
          go mod tidy
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o eva-mind .
          echo "Build OK: $(ls -lh eva-mind | awk '{print $5}')"

  # ============================================================================
  # DEPLOY TO VM
  # ============================================================================
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.VM_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh ${{ env.VM_USER }}@${{ env.VM_IP }} "bash /home/web2a/EVA-Mind/scripts/redeploy.sh"

      - name: Health check
        run: |
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 http://${{ env.VM_IP }}:8091/api/health || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Health check OK (HTTP $HTTP_CODE)"
          else
            echo "WARNING: Health check returned HTTP $HTTP_CODE"
          fi

      - name: Notify
        if: always()
        run: echo "Deploy ${{ job.status }} - commit ${{ github.sha }}"
